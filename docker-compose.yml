services:
  qdrant:
    image: qdrant/qdrant:v1.17.0
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", "echo -n > /dev/tcp/localhost/6333 && echo 'ok'"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      FAQ_CHATBOT_FAQ_DATA_PATH: /app/data/faq.json
      FAQ_CHATBOT_QDRANT_URL: ${FAQ_CHATBOT_QDRANT_URL:-http://qdrant:6333}
      FAQ_CHATBOT_OLLAMA_BASE_URL: ${FAQ_CHATBOT_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      FAQ_CHATBOT_OLLAMA_GENERATE_MODEL: qwen3.5:9b
      FAQ_CHATBOT_OLLAMA_EMBEDDING_MODEL: nomic-embed-text-v2-moe
      FAQ_CHATBOT_OLLAMA_TIMEOUT_SECONDS: "120"
      FAQ_CHATBOT_OLLAMA_GENERATE_MAX_TOKENS: "512"
      FAQ_CHATBOT_OLLAMA_GENERATE_TEMPERATURE: "0.2"
      FAQ_CHATBOT_OLLAMA_ENABLE_THINKING: "false"
      FAQ_CHATBOT_TOP_K: "3"
      FAQ_CHATBOT_SCORE_THRESHOLD: "0.60"
      FAQ_CHATBOT_FALLBACK_MESSAGE: Leider konnte ich Ihre Frage nicht verstehen.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      qdrant:
        condition: service_healthy
    stdin_open: true
    tty: true
    command: ["faqchatbot", "--tui"]

  ingest:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      FAQ_CHATBOT_FAQ_DATA_PATH: /app/data/faq.json
      FAQ_CHATBOT_QDRANT_URL: ${FAQ_CHATBOT_QDRANT_URL:-http://qdrant:6333}
      FAQ_CHATBOT_OLLAMA_BASE_URL: ${FAQ_CHATBOT_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      FAQ_CHATBOT_OLLAMA_GENERATE_MODEL: qwen3.5:9b
      FAQ_CHATBOT_OLLAMA_EMBEDDING_MODEL: nomic-embed-text-v2-moe
      FAQ_CHATBOT_QDRANT_COLLECTION_NAME: faq_entries
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      qdrant:
        condition: service_healthy
    command: ["python", "-m", "scripts.ingest"]

volumes:
  qdrant_data:
